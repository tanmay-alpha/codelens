name: ci-api

# Run Spring Boot tests whenever apps/api/** changes (or this workflow).
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/ci-api.yml'

# Cancel in-flight runs for the same ref so we don't waste runners.
concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mvn test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: codelens_test
          POSTGRES_USER: codelens
          POSTGRES_PASSWORD: codelens_test
        ports:
          - 5432:5432
        # Match local dev default so Spring Boot's healthcheck works.
        options: >-
          --health-cmd "pg_isready -U codelens"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      # Note: no SPRING_PROFILES_ACTIVE here. The @SpringBootTest
      # integration tests set @ActiveProfiles("test") which wins over
      # the env var anyway, and application-test.yml configures an
      # in-memory H2 datasource with H2-compatible Flyway migrations.
      # We do NOT pass SPRING_DATASOURCE_URL because the test profile
      # intentionally uses H2; the Postgres service container defined
      # above is preserved for any future ad-hoc `mvn` runs against
      # a real Postgres (e.g. `mvn flyway:migrate`).
      JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci_test_secret_must_be_at_least_64_bytes_long_for_hs512_aaaa' }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY_TEST || 'ci_test_encryption_key_32b!' }}
      ML_WORKER_URL: http://localhost:8000
      ML_WORKER_SECRET: ci_test_ml_worker_secret
      GITHUB_CLIENT_ID: ci_test_client_id
      GITHUB_CLIENT_SECRET: ci_test_client_secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Show toolchain
        run: |
          java -version
          mvn -v

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('apps/api/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
            ${{ runner.os }}-

      - name: Run tests
        working-directory: apps/api
        run: mvn -B -ntp test

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-surefire-reports
          path: apps/api/target/surefire-reports
          if-no-files-found: ignore
