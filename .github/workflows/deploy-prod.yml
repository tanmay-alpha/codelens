# Required GitHub Secrets:
# RAILWAY_ML_WORKER_WEBHOOK — Railway service redeploy webhook URL
# RAILWAY_API_WEBHOOK — Railway service redeploy webhook URL
# VERCEL_DEPLOY_HOOK — Vercel deploy hook URL

name: Deploy to Production
on:
  push:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Run API tests
        working-directory: apps/api
        run: mvn -B -ntp test

  test-ml-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/ml-worker/requirements.txt
      - name: Install ML worker test dependencies
        working-directory: apps/ml-worker
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio httpx
      - name: Run ML worker tests
        working-directory: apps/ml-worker
        run: python -m pytest tests/ -m "not slow" -q

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd apps/web && npm ci -q
      - run: cd apps/web && npx tsc --noEmit

  deploy-ml-worker:
    needs: [test-api, test-ml-worker, test-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_HOOK: ${{ secrets.RAILWAY_ML_WORKER_WEBHOOK }}
    steps:
      - name: Report unconfigured deploy hook
        if: env.DEPLOY_HOOK == ''
        run: echo "::notice::RAILWAY_ML_WORKER_WEBHOOK is not configured; skipping deployment."
      - name: Trigger Railway redeploy (ml-worker)
        if: env.DEPLOY_HOOK != ''
        run: curl --fail-with-body --silent --show-error -X POST "$DEPLOY_HOOK"

  deploy-api:
    needs: [test-api, test-ml-worker, test-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_HOOK: ${{ secrets.RAILWAY_API_WEBHOOK }}
    steps:
      - name: Report unconfigured deploy hook
        if: env.DEPLOY_HOOK == ''
        run: echo "::notice::RAILWAY_API_WEBHOOK is not configured; skipping deployment."
      - name: Trigger Railway redeploy (api)
        if: env.DEPLOY_HOOK != ''
        run: curl --fail-with-body --silent --show-error -X POST "$DEPLOY_HOOK"

  deploy-web:
    needs: [test-api, test-ml-worker, test-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
    steps:
      - name: Report unconfigured deploy hook
        if: env.DEPLOY_HOOK == ''
        run: echo "::notice::VERCEL_DEPLOY_HOOK is not configured; skipping deployment."
      - name: Trigger Vercel deploy
        if: env.DEPLOY_HOOK != ''
        run: curl --fail-with-body --silent --show-error -X POST "$DEPLOY_HOOK"
