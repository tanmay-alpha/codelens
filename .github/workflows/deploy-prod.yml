# Required GitHub Secrets:
# RAILWAY_ML_WORKER_WEBHOOK — Railway service redeploy webhook URL
# RAILWAY_API_WEBHOOK — Railway service redeploy webhook URL
# VERCEL_DEPLOY_HOOK — Vercel deploy hook URL

name: Deploy to Production
on:
  push:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - run: mvn test -pl apps/api -q

  test-ml-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r apps/ml-worker/requirements.txt -q
      - run: cd apps/ml-worker && python -m pytest tests/ -m "not slow" -q

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd apps/web && npm ci -q
      - run: cd apps/web && npx tsc --noEmit

  deploy-ml-worker:
    needs: [test-api, test-ml-worker, test-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Railway redeploy (ml-worker)
        run: curl -X POST "${{ secrets.RAILWAY_ML_WORKER_WEBHOOK }}"

  deploy-api:
    needs: [test-api, test-ml-worker, test-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Railway redeploy (api)
        run: curl -X POST "${{ secrets.RAILWAY_API_WEBHOOK }}"

  deploy-web:
    needs: [test-api, test-ml-worker, test-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Vercel deploy
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
