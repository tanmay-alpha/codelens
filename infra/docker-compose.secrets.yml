# docker-compose.secrets.yml - Production stack with secrets management
#
# Use this file for production deployments where secrets should be managed
# securely using Docker secrets or a secrets management service.
#
# Usage:
# 1. Create secrets files:
#    echo "codelens_production_password" > postgres_password.txt
#    echo "codelens_production_user" > postgres_user.txt
#
# 2. Deploy with:
#    docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d --secret postgres_password --secret postgres_user
#

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: /run/secrets/postgres_password
      POSTGRES_USER: /run/secrets/postgres_user
    secrets:
      - postgres_password
      - postgres_user

  api:
    environment:
      SPRING_DATASOURCE_USERNAME: /run/secrets/postgres_user
      SPRING_DATASOURCE_PASSWORD: /run/secrets/postgres_password
    secrets:
      - postgres_user
      - postgres_password
    # Additional secrets for production:
    # - jwt_secret
    # - encryption_key
    # - github_client_secret
    # - ml_worker_secret

secrets:
  postgres_password:
    external: true
  postgres_user:
    external: true