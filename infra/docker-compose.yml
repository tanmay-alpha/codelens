# docker-compose.yml — local development stack for the entire CodeLens MVP.
#
# Brings up: postgres, redis, ml-worker, api, web.
# Run:   docker compose up --build
# Tear down (keep data):  docker compose down
# Tear down (wipe data):  docker compose down -v
#
# Environment variables are loaded from .env at the repo root. See
# ENGINEERING_PLAN.md §10 for a list of every variable.

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codelens-postgres
    environment:
      POSTGRES_DB: codelens
      POSTGRES_USER: codelens
      POSTGRES_PASSWORD: codelens_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: seed sample data on first run (only runs when the data
      # volume is empty — i.e. the very first time you bring up the stack).
      - ./scripts/seed-db.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "codelens"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: codelens-redis
    # Tiny inline healthcheck — Redis is fast enough that the default
    # 30s probe is way too long for the api's depends_on to gate on.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ml-worker:
    build:
      context: ./apps/ml-worker
      dockerfile: Dockerfile
    container_name: codelens-ml-worker
    environment:
      - MODEL_NAME=${ML_MODEL_NAME:-tanmay-alpha/codelens-codebert}
      - HF_TOKEN=${HF_TOKEN:-}
      - ML_WORKER_SECRET=${ML_WORKER_SECRET}
    ports:
      - "8000:8000"
    # NOTE: First startup is slow — model downloads ~500MB from HuggingFace.
    # After first run, model is cached in Docker volume.
    volumes:
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/ml/health', timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s  # allow time for first-time model download
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: codelens-api
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/codelens
      - SPRING_DATASOURCE_USERNAME=codelens
      - SPRING_DATASOURCE_PASSWORD=codelens_local
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ML_WORKER_URL=http://ml-worker:8000
      - ML_WORKER_SECRET=${ML_WORKER_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: codelens-web
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  hf_cache:
